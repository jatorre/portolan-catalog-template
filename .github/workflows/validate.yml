name: Validate catalog

# Runs on every PR and push. No credentials (reads the repo + anonymous HEADs against the
# public bucket), so it works on fork PRs — the trust gate for accepting contributions.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet fastavro jsonschema
      - run: python3 tools/validate.py
